uk:
  title: Малі перерви, сильні звички футболка
  description: |
    MOVE. RESET. SHIP. 💻✨
    Малі перерви. Сильні звички.

    Створено для розробників, креаторів і всіх, хто забуває вставати, поки спина не нагадає про себе.

    Цей дизайн передає просту істину: прогрес не лише в коді — а у твоїх звичках. Коротке перезавантаження, кілька присідань, момент, щоб перевести подих… навіть твій кіт це розуміє.

    Чистий, грайливий і тихо мотивуючий, цей футболка перетворює робочу перерву на спосіб мислення.

    ---

    Чому тобі сподобається:

    Мотивація без крінжу 💡
    Впізнаваний стиль dev та remote роботи
    Унікальна ілюстрація (так, навіть кіт робить присідання) 🐱
    Ідеальний баланс гумору та дисципліни
    Чудовий початок розмови

    ---

    Для реального життя:

    М’яка, дихаюча бавовна для комфорту на весь день
    Легка – ідеально для роботи та відпочинку
    Стійкий принт, що зберігає стиль
    Класичний крій, що підходить усюди

    ---

    Ідеально для:

    Розробників і remote працівників
    Новачків у спорті та “почну завтра”
    Офісних бійців, яким потрібні нагадування
    Подарунків, що реально корисні (і смішні)

    У комплекті:

    ✔ 1x надрукована футболка
    ✔ 1x м’яке нагадування рухатися 😉
