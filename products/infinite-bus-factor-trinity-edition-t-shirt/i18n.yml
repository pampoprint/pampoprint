de:
  title: "Infinite Bus Factor: Trinity Edition"
  description: |
    ♾️ Trinity Bus Factor — Unendlich durch Design

    Starke Teams hängen nicht von einer einzelnen Person ab.
    Sie skalieren durch geteiltes Wissen, Zusammenarbeit und Systeme, die über Individuen hinaus bestehen.

    Dieses Design verwandelt das klassische **„Bus-Factor“**
    Engineering-Konzept in etwas Positives:
    **unendliche Resilienz durch Open-Source-Denken.**

    Mit drei leuchtenden Infinity-Schleifen für
    **Code**, **Sales** und **Buchhaltung**
    feiert dieses Shirt Teams, in denen Wissen frei zwischen allen Abteilungen fließt.

    ```
    **⚡ Gebaut für Menschen, die Single Points of Failure hassen.**

    <span class="text-sm">Bessere Systeme. Bessere Teams. Bessere Kultur.</span>
    ```

    ---

    🔥 Warum dieses Shirt heraussticht

    ✔ Cleverer „Bus-Factor“-Engineering-Humor
    ✔ Triple-Infinity-Artwork mit Open-Source-Glow
    ✔ Zeigt Zusammenarbeit über Entwickler hinaus
    ✔ Cleanes futuristisches Design mit starkem Kontrast
    ✔ **KOSTENLOSER Versand inklusive**

    ---

    👕 Für den Alltag gemacht

    • Weiche ringgesponnene Baumwolle für maximalen Komfort
    • Leicht und atmungsaktiv
    • Langlebiger Druck für dauerhafte Qualität
    • Klassischer Fit für Arbeit, Meetups & Alltag

    ---

    🎯 Perfekt für

    • Entwickler & Ingenieure
    • Startup-Gründer & Indie Builder
    • Open-Source-Contributors
    • Cross-funktionale Tech-Teams
    • Geschenke für Menschen, die alles dokumentieren

    ---

    ```
    **🚀 Unendliche Systeme beginnen mit geteiltem Wissen.**

    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
      Leg es in den Warenkorb, bevor jemand wieder Passwörter in einer Excel-Tabelle speichert.
    </p>
    ```

