uk:
  title: "Infinite Bus Factor: Trinity Edition"
  description: |
    ♾️ Trinity Bus Factor — Нескінченність за дизайном

    Сильні команди не залежать від однієї людини.
    Вони масштабуються через спільні знання, співпрацю та системи, що переживають окремих людей.

    Цей дизайн бере класичний інженерний концепт **“bus factor”**
    і перетворює його на щось позитивне:
    **нескінченну стійкість через open source мислення.**

    З трьома світними кільцями нескінченності для
    **коду**, **продажів** і **бухгалтерії**,
    ця футболка святкує команди, де знання вільно циркулює між усіма відділами.

    ```
    **⚡ Створено для тих, хто ненавидить single points of failure.**

    <span class="text-sm">Кращі системи. Кращі команди. Краща культура.</span>
    ```

    ---

    🔥 Чому ця футболка особлива

    ✔ Розумний інженерний гумор “bus factor”  
    ✔ Потрійний інфініті-дизайн з open source естетикою  
    ✔ Показує співпрацю поза межами девелопменту  
    ✔ Чистий футуристичний дизайн з сильним контрастом  
    ✔ **БЕЗКОШТОВНА доставка включена**

    ---

    👕 Створена для щоденного носіння

    • М’яка кільцево-прядена бавовна для комфорту  
    • Легка та дихаюча  
    • Друк, що довго зберігає якість  
    • Класичний крій для роботи та повсякденності  

    ---

    🎯 Ідеально для

    • Розробників та інженерів  
    • Засновників стартапів та indie builder’ів  
    • Open source контриб’юторів  
    • Крос-функціональних tech-команд  
    • Подарунків для тих, хто все документує  

