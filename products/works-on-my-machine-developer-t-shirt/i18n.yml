de:
  title: Funktioniert auf meinem Rechner Entwickler T-Shirt
  description: |
    💻 Works on My Machine — Problem gelöst

    Der ikonischste Satz in der Softwareentwicklung — jetzt tragbar.

    Wenn du schon mal Code ausgeliefert hast, der perfekt funktioniert hat…
    **auf deinem Rechner**,
    dann spricht dieses T-Shirt deine Sprache.

    ```
    ⚡ **Sofortige Wiedererkennung.**

    Jeder Entwickler versteht es. Alle anderen fragen nach.
    ```

    ---

    🔥 Warum das ein Bestseller ist

    ✔ Einer der relatablesten Dev-Jokes überhaupt
    ✔ Klares, boldes Design, das sofort auffällt
    ✔ Perfekt fürs Büro, Meetups oder Remote Calls 😄
    ✔ **KOSTENLOSER Versand inklusive**

    ---

    👕 Für den Alltag gemacht

    • Weiche ringgesponnene Baumwolle für Komfort den ganzen Tag
    • Leicht und atmungsaktiv
    • Langlebiger Druck, der viele Wäschen übersteht
    • Klassischer Schnitt für jede Situation

    ---

    🎯 Perfekt für

    • Entwickler & Software Engineers
    • DevOps & QA Teams
    • Tech Meetups & Konferenzen
    • Geschenke für deinen Lieblings-Programmierer

    ---

    ```
    **🚀 Funktioniert auf deinem Rechner. Sieht überall gut aus.**
    In den Warenkorb legen, bevor es in Production kaputtgeht.
    ```

