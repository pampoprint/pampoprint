    ✔ Gran conversación entre equipos de desarrollo
    ✔ <span class="text-heading font-semibold">ENVÍO GRATIS incluido</span>

    ---

    👕 Hecha para el día a día

    • Algodón ring-spun suave para comodidad todo el día
