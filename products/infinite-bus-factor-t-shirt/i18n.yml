de:
  title: Infinite Bus Factor T-Shirt
  description: |
    ♾️ Bus Factor Unendlich — Powered by Open Source

    Was passiert, wenn Wissen geteilt, dokumentiert und offen entwickelt wird?
    Dein Team wird nicht mehr fragil.

    Dieses Design nimmt das klassische Engineering-Konzept des
    **„Bus Factor“**
    und dreht es mit einer einfachen Idee um:
    **Open Source macht Teams stärker.**

    Statt eines einzelnen Ausfallpunkts bekommst du Zusammenarbeit, Transparenz und Resilienz —
    Systeme, die jeden einzelnen Entwickler überdauern können.

    ```
    ⚡ **Dev-Humor mit positivem Twist.**
    Weniger Gatekeeping. Mehr geteiltes Wissen.
    ```

    ---

    🔥 Warum dieses Shirt heraussticht

    ✔ Cleverer „Bus Factor“-Engineering-Referenz
    ✔ Feiert Open-Source-Kultur und Zusammenarbeit
    ✔ Cleanes Tech-Design mit leuchtendem Infinity-Symbol
    ✔ Perfekter Gesprächsstarter für Dev-Teams
    ✔ <span class="text-heading font-semibold">KOSTENLOSER Versand inklusive</span>

    ---

    👕 Für den Alltag gemacht

    • Weiche ringgesponnene Baumwolle für ganztägigen Komfort
    • Leicht und atmungsaktiv
    • Langlebiger Druck mit hoher Detailtreue
    • Klassischer Fit für Arbeit und Freizeit

    ---

    🎯 Perfekt für

    • Entwickler & Ingenieure
    • Open-Source-Contributors
    • Tech-Leads & Startup-Teams
    • DevOps, Plattform- & Infrastruktur-Teams
    • Geschenke für deinen Lieblings-Coding-Teammate

    ---

    ```
    **🚀 Geteiltes Wissen skaliert unendlich.**

    In den Warenkorb legen, bevor jemand es in einem anderen Framework neu schreibt.
    ```

fr:
  title: T-Shirt Infinite Bus Factor
  description: |
    ♾️ Bus Factor Infini — Propulsé par l’Open Source

    Que se passe-t-il lorsque la connaissance est partagée, documentée et construite en open source ?
    Votre équipe cesse d’être fragile.

    Ce design reprend le concept classique d’ingénierie
    **“bus factor”**
    et le transforme avec une idée simple :
    **l’open source rend les équipes plus fortes.**

    Au lieu d’un point de défaillance unique, vous obtenez collaboration, visibilité et résilience —
    des systèmes capables de survivre à n’importe quel développeur individuel.

    ```
    ⚡ **Humour dev avec une touche positive.**
    Moins de barrières. Plus de savoir partagé.
    ```

    ---

    🔥 Pourquoi ce t-shirt se démarque

    ✔ Référence intelligente au concept “bus factor”
    ✔ Célèbre la culture open source et la collaboration
    ✔ Design tech épuré avec symbole infini lumineux
    ✔ Excellent sujet de conversation pour équipes dev
    ✔ <span class="text-heading font-semibold">LIVRAISON GRATUITE incluse</span>

    ---

    👕 Conçu pour le quotidien

    • Coton ring-spun doux pour un confort toute la journée
    • Léger et respirant
    • Impression durable avec détails nets
    • Coupe classique pour travail et usage quotidien

    ---

    🎯 Parfait pour

    • Développeurs & ingénieurs
    • Contributeurs open source
    • Tech leads & équipes startup
    • DevOps, plateformes & infrastructures
    • Cadeaux pour ton coéquipier préféré

    ---

    ```
    **🚀 Le savoir partagé scale à l’infini.**

    Ajoutez au panier avant que quelqu’un ne le réécrive dans un autre framework.
    ```

