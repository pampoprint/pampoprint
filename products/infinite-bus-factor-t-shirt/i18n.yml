uk:
  title: Футболка Infinite Bus Factor
  description: |
    ♾️ Bus Factor Нескінченність — на базі Open Source

    Що стається, коли знання діляться, документуються і створюються відкрито?
    Твоя команда перестає бути крихкою.

    Цей дизайн бере класичний інженерний концепт
    **“bus factor”**
    і перевертає його простою ідеєю:
    **open source робить команди сильнішими.**

    Замість єдиної точки відмови ти отримуєш співпрацю, прозорість і стійкість —
    такі системи переживають будь-якого окремого розробника.

    ```
    ⚡ **Dev-гумор з позитивним сенсом.**
    Менше бар’єрів. Більше спільних знань.
    ```

    ---

    🔥 Чому ця футболка особлива

    ✔ Розумне відсилання до концепції “bus factor”
    ✔ Святкує культуру open source і співпрацю
    ✔ Чистий tech-дизайн зі світним символом нескінченності
    ✔ Ідеальний привід для розмов у dev-ком’юніті
    ✔ <span class="text-heading font-semibold">БЕЗКОШТОВНА доставка включена</span>

    ---

    👕 Створена для щоденного носіння

    • М’яка кільцево-прядена бавовна для комфорту
    • Легка та дихаюча тканина
    • Друк, що зберігає деталізацію з часом
    • Класичний крій для роботи й повсякденності

    ---

    🎯 Ідеально для

    • Розробників та інженерів
    • Open source контриб’юторів
    • Техлідів і стартап-команд
    • DevOps, платформ та інфраструктури
    • Подарунків для улюбленого колеги-кодера

    ---

    ```
    **🚀 Спільні знання масштабуються нескінченно.**

    Додай у кошик, поки хтось не перепише це в іншому фреймворку.
    ```
